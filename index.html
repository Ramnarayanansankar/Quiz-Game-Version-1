<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temple Runner: Curse of the Jungle</title>
    <style>
        :root {
            --primary: #ffd700;
            --magnet: #00ffff;
            --bg: #0a1118;
            --text: #f0f0f0;
            --font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --danger: #ff3333;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: var(--font);
            touch-action: none;
            user-select: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(10, 17, 24, 0.4) 0%, rgba(5, 8, 12, 0.95) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            transition: opacity 0.3s;
        }
        .hidden {
            opacity: 0;
            pointer-events: none !important;
        }
        h1 {
            color: var(--primary);
            font-size: 4rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            text-align: center;
            line-height: 1.1;
        }
        .subtitle {
            color: var(--danger);
            font-size: 1.5rem;
            letter-spacing: 8px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.8);
            text-transform: uppercase;
        }
        .char-select-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .char-btn {
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            padding: 0 15px;
            transition: color 0.2s, transform 0.2s;
        }
        .char-btn:hover {
            color: var(--primary);
            transform: scale(1.2);
        }
        #char-name {
            font-size: 1.5rem;
            font-weight: bold;
            min-width: 120px;
            text-align: center;
            color: var(--primary);
            text-transform: uppercase;
        }
        .controls-info {
            color: #aaa;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        button.action-btn {
            background: linear-gradient(45deg, #cc8800, #ffcc00);
            border: none;
            padding: 15px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #000;
            border-radius: 40px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        button.action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.4);
        }
        #hud {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            width: calc(100% - 40px);
        }
        .hud-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }
        .hud-label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .hud-value { font-size: 1.8rem; color: var(--primary); font-weight: bold; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        .hud-value.dist { font-size: 1.2rem; color: #fff; text-shadow: none; }
        
        #powerup-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            background: rgba(0,0,0,0.8);
            border-radius: 10px;
            padding: 5px;
            border: 1px solid var(--magnet);
            display: none;
        }
        #powerup-bar {
            height: 10px;
            background: var(--magnet);
            width: 100%;
            border-radius: 5px;
            box-shadow: 0 0 10px var(--magnet);
            transition: width 0.1s linear;
        }
        #powerup-label {
            text-align: center;
            color: var(--magnet);
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #pause-btn {
            pointer-events: auto;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        #pause-btn:hover { background: rgba(255, 255, 255, 0.2); }
        
        .damage-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 0px rgba(255, 0, 0, 0);
            transition: box-shadow 0.2s;
            pointer-events: none;
            z-index: 5;
        }
        .flash-damage { box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.8); }
        .flash-magnet { box-shadow: inset 0 0 80px rgba(0, 255, 255, 0.4); }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .subtitle { font-size: 1rem; letter-spacing: 4px; }
            .controls-info { font-size: 0.85rem; }
            button.action-btn { padding: 12px 35px; font-size: 1.2rem; }
            .hud-value { font-size: 1.4rem; }
            .char-select-container { padding: 5px 15px; }
            #char-name { font-size: 1.2rem; min-width: 100px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="game-container"></div>
    <div class="damage-overlay" id="fx-overlay"></div>

    <div id="ui-layer">
        <div id="hud" class="hidden">
            <div class="hud-box">
                <div class="hud-label">Score</div>
                <div class="hud-value" id="score-display">0</div>
                <div class="hud-label" style="margin-top:5px;">Distance</div>
                <div class="hud-value dist" id="distance-display">0m</div>
            </div>
            <button id="pause-btn">|| PAUSE</button>
            <div class="hud-box" style="text-align: right;">
                <div class="hud-label">Best</div>
                <div class="hud-value" id="highscore-display">0</div>
            </div>
            
            <div id="powerup-container">
                <div id="powerup-label">MAGNET ACTIVE</div>
                <div id="powerup-bar"></div>
            </div>
        </div>

        <div id="start-screen" class="screen">
            <h1>Jungle<br>Runner</h1>
            <div class="subtitle">Escape the Beast</div>
            
            <div class="char-select-container">
                <button class="char-btn" id="prev-char">◀</button>
                <span id="char-name">Scout</span>
                <button class="char-btn" id="next-char">▶</button>
            </div>

            <div class="controls-info">
                <strong>DESKTOP:</strong> Arrows/WASD to Move, Jump & Slide<br>
                <strong>MOBILE:</strong> Swipe to Move, Jump & Slide<br>
                Collect Blue Orbs for Magnet Power!
            </div>
            <button class="action-btn" id="start-btn">TAP TO RUN</button>
        </div>

        <div id="pause-screen" class="screen hidden">
            <h1>PAUSED</h1>
            <button class="action-btn" id="resume-btn">RESUME</button>
        </div>

        <div id="game-over-screen" class="screen hidden">
            <h1 style="color: var(--danger); text-shadow: 0 0 20px rgba(255,0,0,0.6);">DEVOURED!</h1>
            <div class="controls-info" style="font-size: 1.5rem; color: white; margin: 20px 0;">
                Score: <span id="final-score" style="color: var(--primary); font-weight: bold;">0</span><br>
                Distance: <span id="final-distance" style="color: #ccc;">0</span>m
            </div>
            <button class="action-btn" id="restart-btn">RUN AGAIN</button>
        </div>
    </div>

<script>
/**
 * AUDIO ENGINE
 */
class AudioEngine {
    constructor() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.enabled = false;
    }
    init() {
        if (this.ctx.state === 'suspended') this.ctx.resume();
        this.enabled = true;
        this.startAmbience();
    }
    playTone(fStart, fEnd, type, duration, vol=0.1) {
        if (!this.enabled) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(fStart, this.ctx.currentTime);
        if (fEnd) osc.frequency.exponentialRampToValueAtTime(fEnd, this.ctx.currentTime + duration);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + duration);
    }
    playNoise(duration, vol=0.2, isDeep=false) {
        if (!this.enabled) return;
        const bufferSize = this.ctx.sampleRate * duration;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        const filter = this.ctx.createBiquadFilter();
        filter.type = isDeep ? 'lowpass' : 'bandpass';
        filter.frequency.value = isDeep ? 400 : 1000;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        noise.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
        noise.start();
    }
    jump() { this.playTone(300, 600, 'square', 0.2, 0.05); }
    slide() { this.playNoise(0.3, 0.1); }
    coin() { this.playTone(800, 1200, 'sine', 0.1, 0.08); }
    powerup() { this.playTone(400, 1500, 'triangle', 0.4, 0.1); }
    crash() { 
        this.playNoise(0.8, 0.5, true); 
        this.playTone(150, 40, 'sawtooth', 0.8, 0.4);
        setTimeout(() => this.roar(), 200);
    }
    roar() {
        if (!this.enabled) return;
        this.playNoise(1.5, 0.8, true);
        this.playTone(80, 20, 'sawtooth', 1.5, 0.5);
    }
    startAmbience() {
        if (this.ambienceOsc) return;
        this.ambienceOsc = this.ctx.createOscillator();
        this.ambienceOsc.type = 'sine';
        this.ambienceOsc.frequency.value = 45;
        const lfo = this.ctx.createOscillator(); lfo.frequency.value = 0.2;
        const lfoGain = this.ctx.createGain(); lfoGain.gain.value = 5;
        lfo.connect(lfoGain); lfoGain.connect(this.ambienceOsc.frequency);
        const gain = this.ctx.createGain(); gain.gain.value = 0.03;
        this.ambienceOsc.connect(gain); gain.connect(this.ctx.destination);
        lfo.start(); this.ambienceOsc.start();
    }
}

/**
 * CONFIG & DATA
 */
const CONFIG = {
    laneWidth: 4.5,
    gravity: -85,
    jumpVelocity: 26,
    baseSpeed: 35,
    maxSpeed: 90,
    speedInc: 0.3, 
    chunkLength: 60,
    fogColor: 0x050a0f,
    magnetDuration: 8.0,
    avatars: [
        { name: "Scout", color: 0x00ffcc, type: 'bot' },
        { name: "Ninja", color: 0xff1111, type: 'stealth' },
        { name: "Explorer", color: 0xffaa00, type: 'classic' }
    ],
    colors: {
        coin: 0xffd700,
        magnet: 0x00ffff,
        obsLow: 0x4a3c2b,
        obsHigh: 0x3d434a,
        obsBlock: 0x6e2c2c,
        ground: 0x1a241e,
        leaves: 0x0a2914,
        trunk: 0x302013,
        ruin: 0x3a423d,
        monster: 0x0a0510
    }
};

/**
 * GAME ENGINE
 */
class TempleRunner {
    constructor() {
        this.container = document.getElementById('game-container');
        this.ui = {
            start: document.getElementById('start-screen'),
            pause: document.getElementById('pause-screen'),
            over: document.getElementById('game-over-screen'),
            hud: document.getElementById('hud'),
            score: document.getElementById('score-display'),
            dist: document.getElementById('distance-display'),
            high: document.getElementById('highscore-display'),
            finalScore: document.getElementById('final-score'),
            finalDist: document.getElementById('final-distance'),
            fx: document.getElementById('fx-overlay'),
            charName: document.getElementById('char-name'),
            pwrBox: document.getElementById('powerup-container'),
            pwrBar: document.getElementById('powerup-bar')
        };
        
        this.audio = new AudioEngine();
        this.clock = new THREE.Clock();
        
        // State
        this.state = 'START'; 
        this.score = 0;
        this.distance = 0;
        this.highScore = localStorage.getItem('templeRunHigh') || 0;
        this.ui.high.innerText = this.highScore;
        this.speed = CONFIG.baseSpeed;
        this.charIndex = 0;
        
        this.initThree();
        this.initEnvironment();
        this.initPools();
        this.initPlayer();
        this.initMonster();
        this.bindEvents();
        
        // Menu animation loop
        this.animate();
    }

    initThree() {
        this.scene = new THREE.Scene();
        this.scene.fog = new THREE.FogExp2(CONFIG.fogColor, 0.02);

        this.camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 400);
        this.camOffset = new THREE.Vector3(0, 8, 14);
        
        this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.renderer.shadowMap.enabled = true;
        this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        this.container.appendChild(this.renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.3);
        this.scene.add(ambient);

        this.dirLight = new THREE.DirectionalLight(0xaaccff, 0.8);
        this.dirLight.position.set(100, 150, -50);
        this.dirLight.castShadow = true;
        this.dirLight.shadow.camera.left = -30;
        this.dirLight.shadow.camera.right = 30;
        this.dirLight.shadow.camera.top = 30;
        this.dirLight.shadow.camera.bottom = -30;
        this.dirLight.shadow.mapSize.width = 1024;
        this.dirLight.shadow.mapSize.height = 1024;
        this.scene.add(this.dirLight);

        this.playerLight = new THREE.PointLight(CONFIG.avatars[this.charIndex].color, 1.5, 25);
        this.scene.add(this.playerLight);
    }

    buildAvatar(index) {
        if(this.player && this.player.mesh) this.scene.remove(this.player.mesh);
        
        this.player = this.player || {
            lane: 0, targetX: 0, yVel: 0, isJumping: false, isSliding: false,
            slideTimer: 0, magnetTimer: 0, aabb: { w: 1, h: 2, d: 1 }
        };
        
        this.player.mesh = new THREE.Group();
        const cfg = CONFIG.avatars[index];
        const mat = new THREE.MeshStandardMaterial({ color: cfg.color, roughness: 0.3, metalness: 0.6 });
        const darkMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
        
        if (cfg.type === 'bot') {
            this.pBody = new THREE.Mesh(new THREE.BoxGeometry(1, 1.2, 0.6), mat);
            this.pHead = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), mat);
        } else if (cfg.type === 'stealth') {
            this.pBody = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 1.2, 8), darkMat);
            this.pHead = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), mat);
        } else {
            this.pBody = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.5), mat);
            this.pHead = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.6, 16), mat);
        }

        this.pBody.position.y = 1.2; this.pBody.castShadow = true;
        this.pHead.position.y = 2.1; this.pHead.castShadow = true;
        this.player.mesh.add(this.pBody, this.pHead);
        
        // Magnet Aura
        const auraGeo = new THREE.TorusGeometry(1.5, 0.05, 8, 24);
        const auraMat = new THREE.MeshBasicMaterial({ color: CONFIG.colors.magnet, transparent: true, opacity: 0.5 });
        this.pAura = new THREE.Mesh(auraGeo, auraMat);
        this.pAura.rotation.x = Math.PI/2;
        this.pAura.position.y = 1;
        this.pAura.visible = false;
        this.player.mesh.add(this.pAura);

        this.scene.add(this.player.mesh);
        this.playerLight.color.setHex(cfg.color);
    }

    initPlayer() {
        this.buildAvatar(this.charIndex);
        
        this.particles = [];
        const pGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
        for(let i=0; i<40; i++) {
            const pMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const p = new THREE.Mesh(pGeo, pMat);
            p.visible = false;
            this.scene.add(p);
            this.particles.push({ mesh: p, life: 0, maxLife: 0.4, vx:0, vy:0, vz:0, type: 'dust' });
        }
    }

    initMonster() {
        this.monster = new THREE.Group();
        const mGeo = new THREE.IcosahedronGeometry(4, 1);
        const mMat = new THREE.MeshStandardMaterial({ color: CONFIG.colors.monster, roughness: 1, flatShading: true });
        const body = new THREE.Mesh(mGeo, mMat);
        
        const eyeGeo = new THREE.SphereGeometry(0.6, 8, 8);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const eye1 = new THREE.Mesh(eyeGeo, eyeMat); eye1.position.set(-1.5, 1, -3.5);
        const eye2 = new THREE.Mesh(eyeGeo, eyeMat); eye2.position.set(1.5, 1, -3.5);
        
        this.mLight = new THREE.PointLight(0xff0000, 2, 20);
        this.mLight.position.set(0, 0, -4);

        this.monster.add(body, eye1, eye2, this.mLight);
        this.monster.position.set(0, 5, 20);
        this.scene.add(this.monster);
    }

    initEnvironment() {
        this.floorChunks = [];
        const fMat = new THREE.MeshStandardMaterial({ color: CONFIG.colors.ground, roughness: 1 });
        const fGeo = new THREE.PlaneGeometry(CONFIG.laneWidth * 5, CONFIG.chunkLength);
        fGeo.rotateX(-Math.PI / 2);

        for (let i = 0; i < 12; i++) {
            const mesh = new THREE.Mesh(fGeo, fMat);
            mesh.receiveShadow = true;
            mesh.position.z = -i * CONFIG.chunkLength;
            this.scene.add(mesh);
            this.floorChunks.push(mesh);
        }

        this.scenery = [];
        const rMat = new THREE.MeshStandardMaterial({ color: CONFIG.colors.ruin, roughness: 0.9 });
        const trunkGeo = new THREE.CylinderGeometry(0.5, 0.8, 4, 8);
        const trunkMat = new THREE.MeshStandardMaterial({ color: CONFIG.colors.trunk });
        const leafGeo = new THREE.ConeGeometry(3, 8, 8);
        const leafMat = new THREE.MeshStandardMaterial({ color: CONFIG.colors.leaves, flatShading: true });

        for(let i=0; i<60; i++) {
            let obj = new THREE.Group();
            let isTree = Math.random() > 0.4;
            
            if (isTree) {
                let trunk = new THREE.Mesh(trunkGeo, trunkMat); trunk.position.y = 2; trunk.castShadow = true;
                let leaves = new THREE.Mesh(leafGeo, leafMat); leaves.position.y = 7; leaves.castShadow = true;
                obj.add(trunk, leaves);
                let scale = 0.8 + Math.random()*0.8;
                obj.scale.set(scale, scale, scale);
            } else {
                let rGeo = new THREE.BoxGeometry(2 + Math.random()*2, 5 + Math.random()*10, 2 + Math.random()*2);
                let r = new THREE.Mesh(rGeo, rMat);
                r.position.y = rGeo.parameters.height / 2;
                r.castShadow = true; r.receiveShadow = true;
                obj.add(r);
            }
            
            let side = i % 2 === 0 ? 1 : -1;
            obj.position.set( side * (CONFIG.laneWidth * 1.5 + Math.random()*15), 0, -Math.random()*400 );
            this.scene.add(obj);
            this.scenery.push(obj);
        }
        this.nextSpawnZ = -60;
    }

    initPools() {
        this.pools = { obstacles: [], coins: [], powerups: [] };
        
        const mCoin = new THREE.MeshStandardMaterial({ color: CONFIG.colors.coin, metalness: 1, roughness: 0.2, emissive: 0xaa8800 });
        const mMag = new THREE.MeshStandardMaterial({ color: CONFIG.colors.magnet, metalness: 0.8, roughness: 0.2, emissive: 0x005555 });
        const mLow = new THREE.MeshStandardMaterial({ color: CONFIG.colors.obsLow });
        const mHigh = new THREE.MeshStandardMaterial({ color: CONFIG.colors.obsHigh });
        const mBlock = new THREE.MeshStandardMaterial({ color: CONFIG.colors.obsBlock });

        const gCoin = new THREE.TorusGeometry(0.4, 0.15, 8, 16);
        const gMag = new THREE.OctahedronGeometry(0.6);
        const gLow = new THREE.CylinderGeometry(0.5, 0.5, CONFIG.laneWidth*0.9, 8); gLow.rotateZ(Math.PI/2);
        const gHigh = new THREE.BoxGeometry(CONFIG.laneWidth*0.9, 1, 1); 
        const gLeg = new THREE.BoxGeometry(0.4, 3, 0.4); 
        const gBlock = new THREE.BoxGeometry(CONFIG.laneWidth*0.9, 3, 1.5);

        for(let i=0; i<60; i++) {
            const mesh = new THREE.Mesh(gCoin, mCoin);
            mesh.castShadow = true; mesh.visible = false;
            this.scene.add(mesh);
            this.pools.coins.push({ mesh, active: false, aabb: {w:1.5, h:2, d:1.5, y:1} });
        }

        for(let i=0; i<5; i++) {
            const mesh = new THREE.Mesh(gMag, mMag);
            mesh.castShadow = true; mesh.visible = false;
            this.scene.add(mesh);
            this.pools.powerups.push({ mesh, active: false, type: 'magnet', aabb: {w:1.5, h:2, d:1.5, y:1} });
        }

        for(let i=0; i<45; i++) {
            const type = Math.floor(Math.random() * 3);
            let mesh = new THREE.Group();
            let aabb = { w: CONFIG.laneWidth*0.8, h:1, d:1, y:0 };

            if (type === 0) { // Log
                const part = new THREE.Mesh(gLow, mLow);
                part.position.y = 0.5; part.castShadow = true; mesh.add(part);
                aabb.h = 1.2; aabb.y = 0.6;
            } else if (type === 1) { // Arch
                const top = new THREE.Mesh(gHigh, mHigh);
                top.position.y = 2.8; top.castShadow = true;
                const l1 = new THREE.Mesh(gLeg, mHigh); l1.position.set(-1.8, 1.5, 0); l1.castShadow=true;
                const l2 = new THREE.Mesh(gLeg, mHigh); l2.position.set(1.8, 1.5, 0); l2.castShadow=true;
                mesh.add(top, l1, l2);
                aabb.h = 1; aabb.y = 2.8;
            } else { // Wall
                const part = new THREE.Mesh(gBlock, mBlock);
                part.position.y = 1.5; part.castShadow = true; mesh.add(part);
                aabb.h = 3; aabb.y = 1.5;
            }
            mesh.visible = false;
            this.scene.add(mesh);
            this.pools.obstacles.push({ mesh, type, active: false, aabb });
        }
    }

    bindEvents() {
        window.addEventListener('resize', () => {
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('start-btn').addEventListener('click', () => this.startGame());
        document.getElementById('pause-btn').addEventListener('click', () => this.togglePause());
        document.getElementById('resume-btn').addEventListener('click', () => this.togglePause());
        document.getElementById('restart-btn').addEventListener('click', () => this.resetGame());

        document.getElementById('prev-char').addEventListener('click', () => {
            this.charIndex = (this.charIndex - 1 + CONFIG.avatars.length) % CONFIG.avatars.length;
            this.ui.charName.innerText = CONFIG.avatars[this.charIndex].name;
            this.buildAvatar(this.charIndex);
        });
        document.getElementById('next-char').addEventListener('click', () => {
            this.charIndex = (this.charIndex + 1) % CONFIG.avatars.length;
            this.ui.charName.innerText = CONFIG.avatars[this.charIndex].name;
            this.buildAvatar(this.charIndex);
        });

        window.addEventListener('keydown', (e) => {
            if (this.state !== 'PLAYING') return;
            switch(e.code) {
                case 'ArrowLeft': case 'KeyA': this.moveLane(-1); break;
                case 'ArrowRight': case 'KeyD': this.moveLane(1); break;
                case 'ArrowUp': case 'Space': case 'KeyW': this.jump(); break;
                case 'ArrowDown': case 'KeyS': this.slide(); break;
                case 'Escape': this.togglePause(); break;
            }
        });

        let tX = 0, tY = 0;
        window.addEventListener('touchstart', (e) => { tX = e.touches[0].clientX; tY = e.touches[0].clientY; }, {passive: false});
        window.addEventListener('touchmove', (e) => { if (this.state === 'PLAYING') e.preventDefault(); }, {passive: false});
        window.addEventListener('touchend', (e) => {
            if (this.state !== 'PLAYING') return;
            const dx = e.changedTouches[0].clientX - tX, dy = e.changedTouches[0].clientY - tY;
            if (Math.max(Math.abs(dx), Math.abs(dy)) > 30) {
                if (Math.abs(dx) > Math.abs(dy)) this.moveLane(dx > 0 ? 1 : -1);
                else dy > 0 ? this.slide() : this.jump();
            }
        }, {passive: false});
    }

    startGame() {
        this.audio.init();
        this.ui.start.classList.add('hidden');
        this.ui.hud.classList.remove('hidden');
        
        // Snap camera behind player
        this.camera.position.set(0, this.camOffset.y, this.camOffset.z);
        this.camera.lookAt(0, 2, -20);
        
        this.state = 'PLAYING';
        this.clock.start();
    }

    resetGame() {
        this.player.mesh.position.set(0, 0, 0);
        this.player.lane = 0; this.player.targetX = 0; this.player.yVel = 0;
        this.player.isJumping = false; this.player.isSliding = false;
        this.player.magnetTimer = 0; this.pAura.visible = false;
        this.ui.pwrBox.style.display = 'none';
        this.ui.fx.classList.remove('flash-damage', 'flash-magnet');
        
        this.monster.position.set(0, 5, 20);
        this.score = 0; this.distance = 0; this.speed = CONFIG.baseSpeed;
        this.nextSpawnZ = -60;

        this.pools.obstacles.forEach(o => { o.active = false; o.mesh.visible = false; });
        this.pools.coins.forEach(c => { c.active = false; c.mesh.visible = false; });
        this.pools.powerups.forEach(p => { p.active = false; p.mesh.visible = false; });
        
        this.floorChunks.forEach((f, i) => f.position.z = -i * CONFIG.chunkLength);

        this.ui.over.classList.add('hidden');
        this.ui.hud.classList.remove('hidden');
        this.state = 'PLAYING';
        this.clock.start();
    }

    togglePause() {
        if (this.state === 'PLAYING') {
            this.state = 'PAUSED';
            this.ui.pause.classList.remove('hidden');
            this.clock.stop();
        } else if (this.state === 'PAUSED') {
            this.state = 'PLAYING';
            this.ui.pause.classList.add('hidden');
            this.clock.start();
        }
    }

    moveLane(dir) {
        this.player.lane = Math.max(-1, Math.min(1, this.player.lane + dir));
        this.player.targetX = this.player.lane * CONFIG.laneWidth;
    }

    jump() {
        if (!this.player.isJumping && !this.player.isSliding) {
            this.player.yVel = CONFIG.jumpVelocity;
            this.player.isJumping = true;
            this.audio.jump();
        }
    }

    slide() {
        if (!this.player.isJumping && !this.player.isSliding) {
            this.player.isSliding = true;
            this.player.slideTimer = 0.85;
            this.pBody.scale.y = 0.4; this.pHead.position.y = 1.0;
            this.player.aabb.h = 1;
            this.audio.slide();
        }
    }

    spawnEntities() {
        if (this.player.mesh.position.z - 250 < this.nextSpawnZ) {
            const lane = Math.floor(Math.random() * 3) - 1;
            const r = Math.random();

            if (r < 0.6) {
                const obs = this.pools.obstacles.find(o => !o.active);
                if (obs) {
                    obs.active = true; obs.mesh.visible = true;
                    obs.mesh.position.set(lane * CONFIG.laneWidth, 0, this.nextSpawnZ);
                }
                const cLane = lane === 0 ? (Math.random()>0.5?1:-1) : 0;
                
                // 5% chance for magnet instead of coins
                if (Math.random() < 0.05) {
                    const mag = this.pools.powerups.find(p => !p.active);
                    if (mag) {
                        mag.active = true; mag.mesh.visible = true;
                        mag.mesh.position.set(cLane * CONFIG.laneWidth, 1.5, this.nextSpawnZ);
                    }
                } else {
                    this.spawnCoinLine(cLane, this.nextSpawnZ);
                }
            } else {
                this.spawnCoinLine(lane, this.nextSpawnZ);
            }
            this.nextSpawnZ -= Math.random() * 25 + 20;
        }
    }

    spawnCoinLine(lane, z) {
        const count = Math.floor(Math.random() * 4) + 3;
        for(let i=0; i<count; i++) {
            const coin = this.pools.coins.find(c => !c.active);
            if (coin) {
                coin.active = true; coin.mesh.visible = true;
                coin.mesh.position.set(lane * CONFIG.laneWidth, 1, z - i * 4);
            }
        }
    }

    emitParticles(type, pos) {
        let count = type === 'magnet' ? 5 : 1;
        for(let i=0; i<count; i++) {
            const p = this.particles.find(p => p.life <= 0);
            if (p) {
                p.life = p.maxLife; p.mesh.visible = true; p.type = type;
                p.mesh.position.copy(pos);
                if (type === 'dust') {
                    p.mesh.material.color.setHex(0xffffff);
                    p.mesh.position.y = 0.2; p.mesh.position.x += (Math.random()-0.5)*0.8;
                    p.vx = (Math.random()-0.5)*5; p.vy = Math.random()*5+2; p.vz = Math.random()*5;
                } else if (type === 'magnet') {
                    p.mesh.material.color.setHex(CONFIG.colors.magnet);
                    p.vx = (Math.random()-0.5)*15; p.vy = (Math.random()-0.5)*15; p.vz = (Math.random()-0.5)*15;
                }
            }
        }
    }

    updateParticles(dt) {
        this.particles.forEach(p => {
            if (p.life > 0) {
                p.life -= dt;
                p.mesh.position.x += p.vx * dt; p.mesh.position.y += p.vy * dt; p.mesh.position.z += p.vz * dt;
                p.mesh.scale.setScalar(Math.max(0, p.life / p.maxLife));
                if (p.life <= 0) p.mesh.visible = false;
            }
        });
    }

    checkCollisions() {
        const px = this.player.mesh.position.x, py = this.player.mesh.position.y, pz = this.player.mesh.position.z;
        const pAABB = this.player.aabb;

        // Obstacles
        for (const obs of this.pools.obstacles) {
            if (!obs.active) continue;
            const ox = obs.mesh.position.x, oz = obs.mesh.position.z, oAABB = obs.aabb;
            if (Math.abs(pz - oz) < 2) {
                if (Math.abs(px - ox) < (pAABB.w + oAABB.w)/2 &&
                    Math.abs((py + 1) - oAABB.y) < (pAABB.h + oAABB.h)/2 &&
                    Math.abs(pz - oz) < (pAABB.d + oAABB.d)/2) {
                    this.gameOver(); return;
                }
            }
        }

        // Magnet Powerup
        for (const pwr of this.pools.powerups) {
            if (!pwr.active) continue;
            if (Math.abs(pz - pwr.mesh.position.z) < 1.5 && Math.abs(px - pwr.mesh.position.x) < 1.5 && py < 3) {
                pwr.active = false; pwr.mesh.visible = false;
                this.player.magnetTimer = CONFIG.magnetDuration;
                this.ui.pwrBox.style.display = 'block';
                this.pAura.visible = true;
                this.audio.powerup();
                this.ui.fx.classList.add('flash-magnet');
                setTimeout(() => this.ui.fx.classList.remove('flash-magnet'), 200);
                this.emitParticles('magnet', this.player.mesh.position);
            }
        }

        // Coins
        const magnetActive = this.player.magnetTimer > 0;
        for (const coin of this.pools.coins) {
            if (!coin.active) continue;
            const cx = coin.mesh.position.x, cz = coin.mesh.position.z;
            
            // Magnet suck effect
            if (magnetActive && cz - pz < -2 && cz - pz > -30) {
                coin.mesh.position.lerp(this.player.mesh.position, 12 * (this.clock.getDelta() || 0.016));
            }

            const hitRad = magnetActive ? 3.0 : 1.5; // Larger hitbox if magnet active
            if (Math.abs(pz - coin.mesh.position.z) < hitRad && Math.abs(px - coin.mesh.position.x) < hitRad && Math.abs(py - coin.mesh.position.y) < hitRad) {
                coin.active = false; coin.mesh.visible = false;
                this.score += 10;
                this.audio.coin();
            }
        }
    }

    gameOver() {
        this.state = 'OVER';
        this.audio.crash();
        this.ui.fx.classList.add('flash-damage');

        if (this.score > this.highScore) {
            this.highScore = Math.floor(this.score);
            localStorage.setItem('templeRunHigh', this.highScore);
            this.ui.high.innerText = this.highScore;
        }

        setTimeout(() => {
            this.ui.hud.classList.add('hidden');
            this.ui.over.classList.remove('hidden');
            this.ui.finalScore.innerText = Math.floor(this.score);
            this.ui.finalDist.innerText = Math.floor(this.distance);
        }, 1200);
    }

    update(dt) {
        if (this.speed < CONFIG.maxSpeed) this.speed += CONFIG.speedInc * dt;

        // Player Forward
        this.player.mesh.position.z -= this.speed * dt;
        this.distance += (this.speed * dt) / 10;
        this.score += dt * 8;

        // Lateral
        this.player.mesh.position.x += (this.player.targetX - this.player.mesh.position.x) * 15 * dt;

        // Jump & Gravity
        if (this.player.isJumping) {
            this.player.yVel += CONFIG.gravity * dt;
            this.player.mesh.position.y += this.player.yVel * dt;
            if (this.player.mesh.position.y <= 0) {
                this.player.mesh.position.y = 0;
                this.player.isJumping = false; this.player.yVel = 0;
            }
        }

        // Slide
        if (this.player.isSliding) {
            this.player.slideTimer -= dt;
            if (this.player.slideTimer <= 0) {
                this.player.isSliding = false;
                this.pBody.scale.y = 1; this.pHead.position.y = 2.1;
                this.player.aabb.h = 2;
            }
        }

        // Powerups
        if (this.player.magnetTimer > 0) {
            this.player.magnetTimer -= dt;
            this.pAura.rotation.z += 10 * dt;
            this.ui.pwrBar.style.width = (this.player.magnetTimer / CONFIG.magnetDuration * 100) + '%';
            if (this.player.magnetTimer <= 0) {
                this.ui.pwrBox.style.display = 'none';
                this.pAura.visible = false;
            }
        }

        // Run Anim & Dust
        if (!this.player.isJumping && !this.player.isSliding) {
            this.player.mesh.position.y = Math.abs(Math.sin(Date.now() * 0.015)) * 0.3;
            if (Math.random() < 0.4) this.emitParticles('dust', this.player.mesh.position);
        }

        // Camera Update
        const targetCamZ = this.player.mesh.position.z + this.camOffset.z;
        this.camera.position.z += (targetCamZ - this.camera.position.z) * 10 * dt;
        this.camera.position.x += ((this.player.mesh.position.x * 0.4) - this.camera.position.x) * 5 * dt;
        this.camera.position.y = this.camOffset.y + (this.player.isJumping ? this.player.mesh.position.y * 0.3 : 0);
        this.camera.lookAt(this.camera.position.x, 2, this.player.mesh.position.z - 20);

        // Monster Follow
        this.monster.position.x += ((this.player.mesh.position.x * 0.5) - this.monster.position.x) * dt * 3;
        let monsterTargetZ = this.player.mesh.position.z + 18 + Math.sin(Date.now()*0.002)*3; // Hover behind
        this.monster.position.z += (monsterTargetZ - this.monster.position.z) * dt * 4;
        this.monster.position.y = 5 + Math.sin(Date.now()*0.005);
        this.monster.rotation.x -= dt * 2; // roll forward
        this.monster.rotation.y += dt;

        // Lights
        this.dirLight.position.z = this.player.mesh.position.z - 50;
        this.playerLight.position.copy(this.player.mesh.position);
        this.playerLight.position.y += 2;

        // Recycling World
        this.floorChunks.forEach(f => {
            if (f.position.z > this.player.mesh.position.z + CONFIG.chunkLength) f.position.z -= CONFIG.chunkLength * this.floorChunks.length;
        });
        this.scenery.forEach(s => {
            if (s.position.z > this.player.mesh.position.z + 30) s.position.z = this.player.mesh.position.z - 400 - Math.random()*100;
        });

        this.spawnEntities();
        
        const pz = this.player.mesh.position.z;
        this.pools.coins.forEach(c => {
            if (c.active) {
                c.mesh.rotation.y += 4 * dt; 
                if (c.mesh.position.z > pz + 15) c.active = false;
            }
        });
        this.pools.powerups.forEach(p => {
            if (p.active) {
                p.mesh.rotation.x += 2*dt; p.mesh.rotation.y += 3*dt;
                if (p.mesh.position.z > pz + 15) p.active = false;
            }
        });
        this.pools.obstacles.forEach(o => { if (o.active && o.mesh.position.z > pz + 15) { o.active = false; o.mesh.visible = false; } });

        this.updateParticles(dt);
        this.checkCollisions();

        this.ui.score.innerText = Math.floor(this.score);
        this.ui.dist.innerText = Math.floor(this.distance) + 'm';
    }

    animateMenu(dt) {
        // Smooth camera rotation around player in menu
        const time = Date.now() * 0.0005;
        this.camera.position.x = Math.sin(time) * 12;
        this.camera.position.z = Math.cos(time) * 12 + this.player.mesh.position.z;
        this.camera.position.y = 6;
        this.camera.lookAt(this.player.mesh.position.x, 2, this.player.mesh.position.z);
        
        // Idle animation for avatar
        this.player.mesh.position.y = Math.sin(Date.now() * 0.003) * 0.2;
    }

    animateGameOver(dt) {
        // Monster rushes and eats player
        this.monster.position.z -= this.speed * dt * 1.5;
        this.monster.rotation.x -= dt * 10;
        
        // Camera fall down
        this.camera.position.y -= dt * 5;
        if(this.camera.position.y < 1) this.camera.position.y = 1;
        
        // Camera Shake
        this.camera.position.x += (Math.random()-0.5)*0.5;
        this.camera.lookAt(this.player.mesh.position.x, 2, this.player.mesh.position.z);
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        const dt = Math.min(this.clock.getDelta(), 0.1); 
        
        if (this.state === 'PLAYING') {
            this.update(dt);
        } else if (this.state === 'START') {
            this.animateMenu(dt);
        } else if (this.state === 'OVER') {
            this.animateGameOver(dt);
        }
        
        this.renderer.render(this.scene, this.camera);
    }
}

window.onload = () => new TempleRunner();
</script>
