<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Quiz Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: all 0.3s ease;
        }

        /* Start Screen */
        #start-screen h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: -webkit-linear-gradient(#00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #start-screen p {
            margin-bottom: 30px;
            font-size: 1.1rem;
            color: #ddd;
        }

        .difficulty-btns {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-easy { background: #00b09b; color: white; }
        .btn-easy:hover { background: #009688; }
        
        .btn-medium { background: #f2994a; color: white; }
        .btn-medium:hover { background: #e67e22; }
        
        .btn-hard { background: #eb3349; color: white; }
        .btn-hard:hover { background: #c0392b; }

        /* Quiz Screen */
        #quiz-screen {
            display: none;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .category-badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        #question-text {
            font-size: 1.6rem;
            margin-bottom: 30px;
            line-height: 1.4;
            min-height: 80px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
            #question-text { font-size: 1.3rem; }
            .container { padding: 25px; }
        }

        .option-btn {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.2);
            border-color: #4facfe;
        }

        .option-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .option-btn.correct {
            background: rgba(0, 176, 155, 0.4);
            border-color: #00b09b;
        }

        .option-btn.wrong {
            background: rgba(235, 51, 73, 0.4);
            border-color: #eb3349;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .action-btn {
            background: transparent;
            color: white;
            border: 1px solid white;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn:hover:not(:disabled) {
            background: white;
            color: #0f2027;
        }
        
        .action-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Loading */
        #loader {
            display: none;
            font-size: 1.2rem;
            color: #4facfe;
            margin-top: 20px;
        }
        
        .hidden {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="start-screen">
            <h1>Infinite Quiz Pro</h1>
            <p>Endless questions. All topics. Test your knowledge.</p>
            <h3>Select Difficulty to Start:</h3>
            <div class="difficulty-btns" style="margin-top: 20px;">
                <button class="btn btn-easy" onclick="startGame('easy')">Easy</button>
                <button class="btn btn-medium" onclick="startGame('medium')">Medium</button>
                <button class="btn btn-hard" onclick="startGame('hard')">Hard</button>
            </div>
            <div id="start-loader" style="display: none; margin-top: 20px;">Connecting to Global Database...</div>
        </div>

        <div id="quiz-screen">
            <div class="top-bar">
                <div class="category-badge" id="category-badge">Category</div>
                <div class="stats">
                    <div>Score: <span id="score">0</span></div>
                    <div>Difficulty: <span id="diff-display" style="text-transform: capitalize;">Easy</span></div>
                </div>
            </div>

            <h2 id="question-text">Loading question...</h2>

            <div class="options-grid" id="options-grid">
                </div>

            <div id="loader">Fetching more questions...</div>

            <div class="actions">
                <button class="action-btn" id="hint-btn" onclick="useHint()">💡 Hint (50/50)</button>
                <button class="action-btn" id="skip-btn" onclick="skipQuestion()">⏭️ Skip Question</button>
                <button class="action-btn" style="border-color: #eb3349; color: #eb3349;" onclick="quitGame()">🛑 Quit</button>
            </div>
        </div>
    </div>

    <script>
        // State Variables
        let currentDifficulty = 'easy';
        let score = 0;
        let questionQueue = [];
        let currentQuestion = null;
        let isProcessing = false;
        let fetching = false;

        // DOM Elements
        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const questionText = document.getElementById('question-text');
        const optionsGrid = document.getElementById('options-grid');
        const scoreEl = document.getElementById('score');
        const diffDisplay = document.getElementById('diff-display');
        const categoryBadge = document.getElementById('category-badge');
        const hintBtn = document.getElementById('hint-btn');
        const skipBtn = document.getElementById('skip-btn');
        const loader = document.getElementById('loader');
        const startLoader = document.getElementById('start-loader');

        // Utility: Decode HTML entities from API (e.g., &quot; to ")
        function decodeHTML(html) {
            const txt = document.createElement('textarea');
            txt.innerHTML = html;
            return txt.value;
        }

        // Start Game
        async function startGame(difficulty) {
            currentDifficulty = difficulty;
            score = 0;
            scoreEl.innerText = score;
            diffDisplay.innerText = difficulty;
            questionQueue = [];
            
            document.querySelector('.difficulty-btns').style.display = 'none';
            startLoader.style.display = 'block';

            await fetchQuestions();
            
            startScreen.style.display = 'none';
            quizScreen.style.display = 'block';
            
            loadNextQuestion();
        }

        // Fetch Questions from OpenTDB
        async function fetchQuestions() {
            if (fetching) return;
            fetching = true;
            loader.style.display = 'block';
            
            try {
                // Fetching 10 at a time for endless buffer
                const res = await fetch(`https://opentdb.com/api.php?amount=10&difficulty=${currentDifficulty}&type=multiple`);
                const data = await res.json();
                
                if (data.results) {
                    questionQueue.push(...data.results);
                }
            } catch (err) {
                console.error("Failed to fetch questions", err);
            } finally {
                fetching = false;
                loader.style.display = 'none';
            }
        }

        // Load Question into UI
        function loadNextQuestion() {
            isProcessing = false;
            hintBtn.disabled = false;
            skipBtn.disabled = false;
            optionsGrid.innerHTML = '';

            // Refill queue silently if running low
            if (questionQueue.length < 4) {
                fetchQuestions();
            }

            if (questionQueue.length === 0) {
                questionText.innerText = "Gathering questions...";
                setTimeout(loadNextQuestion, 1000);
                return;
            }

            currentQuestion = questionQueue.shift();
            
            categoryBadge.innerText = decodeHTML(currentQuestion.category);
            questionText.innerText = decodeHTML(currentQuestion.question);

            // Combine and shuffle options
            let options = [...currentQuestion.incorrect_answers];
            options.push(currentQuestion.correct_answer);
            options.sort(() => Math.random() - 0.5);

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = decodeHTML(opt);
                btn.onclick = () => checkAnswer(btn, opt);
                optionsGrid.appendChild(btn);
            });
        }

        // Check Answer
        function checkAnswer(selectedBtn, selectedAnswer) {
            if (isProcessing) return;
            isProcessing = true;
            
            const buttons = document.querySelectorAll('.option-btn');
            const isCorrect = selectedAnswer === currentQuestion.correct_answer;

            buttons.forEach(btn => {
                btn.disabled = true;
                if (btn.innerText === decodeHTML(currentQuestion.correct_answer)) {
                    btn.classList.add('correct');
                } else if (btn === selectedBtn && !isCorrect) {
                    btn.classList.add('wrong');
                }
            });

            if (isCorrect) {
                score += 10;
                scoreEl.innerText = score;
            }

            // Wait 1.5 seconds, then load next
            setTimeout(loadNextQuestion, 1500);
        }

        // Hint System (Removes 2 incorrect options)
        function useHint() {
            if (isProcessing || hintBtn.disabled) return;
            hintBtn.disabled = true; // One hint per question
            
            const buttons = Array.from(document.querySelectorAll('.option-btn'));
            const incorrectBtns = buttons.filter(btn => btn.innerText !== decodeHTML(currentQuestion.correct_answer));
            
            // Randomly pick 2 incorrect buttons to hide
            incorrectBtns.sort(() => Math.random() - 0.5);
            incorrectBtns[0].classList.add('hidden');
            incorrectBtns[1].classList.add('hidden');
            
            // Small score penalty for using a hint
            score = Math.max(0, score - 2); 
            scoreEl.innerText = score;
        }

        // Skip Question
        function skipQuestion() {
            if (isProcessing) return;
            loadNextQuestion();
        }

        // Quit Game
        function quitGame() {
            quizScreen.style.display = 'none';
            startScreen.style.display = 'block';
            document.querySelector('.difficulty-btns').style.display = 'flex';
            startLoader.style.display = 'none';
            questionQueue = [];
        }
    </script>
</body>
</html>
